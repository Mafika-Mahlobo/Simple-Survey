<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles/output.css') }}">
    <script src="https://kit.fontawesome.com/05347b7874.js" crossorigin="anonymous"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <title>{% block title %} Home - Survey {% endblock %}</title>
</head>
<body >
    <!-- Overlay -->
     <div class="fixed hidden z-50 top-0 left-0 w-full h-full bg-black/40 backdrop-blur-sm flex-col justify-center items-center overlay">
            <div class="flex flex-col p-5 pt-7 spinner justify-center items-center">
                <div class="">
                    <img class="w-40 h-auto" src="{{ url_for('static', filename='images/spinner.gif') }}" alt="Loading">
                </div>
                <div class="flex justify-center p-2">
                    <p class="text-gray-300">Processing </p>
                </div>
            </div>
            <div class="flex-col success hidden justify-center items-center">
                <i class="fa-regular fa-circle-check text-green-700 text-9xl p-5"></i>
                <p class="text-gray-200 success-message text-center">{{ success }}</p>
                <button class="p-3 bg-gradient-to-b from-green-200 to to-green-400 rounded-md shadow-ls shadow-blue-600 overlay-btn">Ok</button>
            </div>
            <div class="flex-col error hidden justify-center items-center">
                <i class="fa-solid fa-triangle-exclamation text-red-500 text-9xl p-5"></i>
                <p class="text-gray-200 error-message text-center">{{ error }}</p>
                <button class="p-3 bg-gradient-to-b from-red-200 to to-red-400 rounded-md shadow-ls shadow-blue-600 overlay-btn">Cancel</button>
            </div>
            
     </div>

    <!-- Header -->
    <header class="flex justify-between p-0 m-0 bg-gray-200 shadow-sm shadow-blue-600">
        <span class="m-5">_Surveys</span>

        <!-- Desktop menu -->
        <ul class="hidden sm:flex">
            <a href="{{ url_for('main') }}"><li class="p-5 m-0 h-full border-l-gray-700 border-r-gray-700 hover:bg-gray-500 active:bg-gray-500 cursor-pointer nav-btn">Complete Survey</li></a>
            <a href="{{ url_for('survery_results') }}"><li class="p-5 m-0 h-full border-l-gray-700 border-r-gray-700 hover:bg-gray-500 active:bg-gray-500 cursor-pointer nav-btn">View Results</li></a>
        </ul>

        <div class="sm:hidden text-xl mobile-nav p-5">
            <i class="fa-solid fa-bars"></i>
        </div>
    </header>

    <!-- Mobile menu -->
    <nav class="m-0 flex-col  hidden bg-gray-300 mobile-options">
        <ul >
            <a href="{{ url_for('main') }}"><li class="flex justify-center w-full p-1 border-b border-gray-200 nav-btn">Complete Survey</li></a>
            <a href="{{ url_for('survery_results') }}"><li class="flex justify-center w-full p-1 border-b border-gray-200 nav-btn">View Results</li></a>
        </ul>
    </nav>
    {% block content %}{% endblock %}

    <!-- Footer -->
    <section class="flex justify-between p-5 m-0 min-h-15 bg-gray-200 shadow-sm shadow-blue-600"></section>
</body>
</html>
